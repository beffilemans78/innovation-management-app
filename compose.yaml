services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: innovation
      POSTGRES_USER: innovation
      POSTGRES_PASSWORD: innovation
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovation"]
      interval: 5s
      timeout: 5s
      retries: 10
  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?Set KEYCLOAK_CLIENT_SECRET in .env}
      APP_URL: ${APP_URL:-http://localhost:3000}
      KC_HOSTNAME: ${KEYCLOAK_URL:-http://localhost:8080}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    ports: ["8080:8080"]
    volumes: ["./keycloak/import:/opt/keycloak/data/import:ro"]
    depends_on:
      mailpit:
        condition: service_started
  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "127.0.0.1:1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
